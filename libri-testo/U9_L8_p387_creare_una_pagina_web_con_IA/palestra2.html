<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palestra Esempio</title>
    <link rel="stylesheet" href="styles2.css">
</head>
<body>
    <header>
        <h1>Palestra Esempio</h1>
    </header>
    <div class="container">
        <main>
            <h2>Benvenuti alla Palestra Esempio</h2>
            <p>Qui troverai tutte le informazioni necessarie per i nostri iscritti, dalle attività ai corsi, agli orari e molto altro.</p>
            
            <!-- Modulo di Contatto -->
            <section id="contatti">
                <h3>Contattaci</h3>
                <form action="#" method="post">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required>
                    
                    <label for="cognome">Cognome:</label>
                    <input type="text" id="cognome" name="cognome" required>
                    
                    <label for="tipo-richiesta">Tipo di richiesta:</label>
                    <select id="tipo-richiesta" name="tipo-richiesta" required>
                        <option value="informazioni-generali">Informazioni generali</option>
                        <option value="costi">Costi</option>
                        <option value="orari">Orari</option>
                    </select>
                    
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    
                    <label for="messaggio">Messaggio:</label>
                    <textarea id="messaggio" name="messaggio" rows="4" required></textarea>
                    
                    <button type="submit">Invia</button>
                </form>
            </section>
        </main>
        <nav class="sidebar">
            <ul>
                <li><a href="#attivita">Attività</a></li>
                <li><a href="#corsi">Corsi</a></li>
                <li><a href="#orari">Orari</a></li>
                <li><a href="#istruttori">Istruttori</a></li>
                <li><a href="#contatti">Contatti</a></li>
            </ul>
        </nav>
    </div>
</body>
</html>
