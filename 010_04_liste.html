<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Liste HTML</title>
</head>
<body>
    <h1>Liste in HTML</h1>

    <p>Le liste servono a rappresentare insiemi di elementi collegati tra loro.</p>

    <h2>Lista non ordinata</h2>
    <ul>
        <li>Mouse</li>
        <li>Tastiera</li>
        <li>Monitor</li>
    </ul>

    <h2>Lista ordinata</h2>
    <ol>
        <li>Accendere il computer</li>
        <li>Aprire il browser</li>
        <li>Caricare la pagina HTML</li>
    </ol>

    <p>La pagina usa i tag ul, ol e li.</p>
</body>
</html>
