<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Tabelle HTML</title>
</head>
<body>
    <h1>Le tabelle in HTML</h1>

    <p>Le tabelle servono a rappresentare dati organizzati in righe e colonne.</p>

    <table border="1">
        <caption>Orario di esempio</caption>
        <tr>
            <th>Ora</th>
            <th>Materia</th>
            <th>Aula</th>
        </tr>
        <tr>
            <td>08:00</td>
            <td>Informatica</td>
            <td>Lab 2</td>
        </tr>
        <tr>
            <td>09:00</td>
            <td>Sistemi e reti</td>
            <td>Lab 1</td>
        </tr>
        <tr>
            <td>10:00</td>
            <td>TPSIT</td>
            <td>Lab 3</td>
        </tr>
    </table>

    <p>La tabella usa table, tr, th, td e caption.</p>
</body>
</html>
