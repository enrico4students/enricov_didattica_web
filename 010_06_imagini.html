<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Immagini HTML</title>
</head>
<body>
    <h1>Inserire immagini in HTML</h1>

    <p>Le immagini si inseriscono con il tag img.</p>

    <p>In questo esempio viene usata un'immagine segnaposto generata da un servizio online.</p>

    <img src="https://via.placeholder.com/300x120" alt="Immagine di esempio segnaposto" width="300" height="120">

    <p>L'attributo alt descrive l'immagine e aiuta accessibilità e fallback testuale.</p>
    <p>Gli attributi width e height indicano dimensioni visualizzate.</p>
</body>
</html>
